<!DOCTYPE html>
<html>
<head>
  <title>PFP Photo Upload</title>

  <style>
    body {
      text-align: center;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: white;
      font-family: Arial;
      padding-top: 50px;
    }

    .box {
      background: rgba(0,0,0,0.6);
      padding: 30px;
      border-radius: 20px;
      width: 320px;
      margin: auto;
      box-shadow: 0 0 20px rgba(0,0,0,0.7);
    }

    input, button {
      padding: 12px;
      margin: 10px;
      width: 90%;
      font-size: 16px;
      border-radius: 10px;
      border: none;
    }

    button {
      background: #00ffcc;
      color: black;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #00ccaa;
    }
  </style>
</head>
<body>

<div class="box">

<h1>📸 Send Your Photo</h1>
<p>Upload your picture for PFP editing 😎</p>

<form action="https://formsubmit.co/abcrafterboy@gmail.com" 
      method="POST" 
      enctype="multipart/form-data">

  <!-- Name -->
  <input type="text" name="name" placeholder="Your Name" required>

  <!-- WhatsApp -->
  <input type="text" name="whatsapp" placeholder="WhatsApp Number" required>

  <!-- Photo -->
  <input type="file" name="photo" accept="image/*" required>

  <!-- Hidden settings -->
  <input type="hidden" name="_subject" value="New PFP Photo Upload">
  <input type="hidden" name="_captcha" value="false">

  <button type="submit">Send Photo 🚀</button>

</form>

</div>

</body>
</html>
